<!DOCTYPE html>
<html>
<head>
    <title>Edu Game - Player</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: white; }
        .door-container { display: flex; justify-content: center; gap: 20px; margin-top: 50px; }
        .door { 
            width: 150px; height: 200px; background: #5d4037; 
            border: 4px solid #3e2723; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; padding: 10px; transition: 0.2s;
        }
        .door:hover { background: #795548; transform: scale(1.05); }
        #status { color: #888; font-size: 0.9em; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="setup">
        <h2>Enter Name</h2>
        <input id="playerName" placeholder="Your Name">
        <button onclick="join()">Join Game</button>
    </div>

    <div id="game" class="hidden">
        <h1 id="qText">Waiting for question...</h1>
        <div id="doors" class="door-container"></div>
        <hr>
        <p>Score: <span id="score">0</span> | Progress: <span id="progress">0</span></p>
        <p id="status">Connected</p>
    </div>

    <script>
        const socket = io("https://server.ctksystem.com");
        let myId = localStorage.getItem("edu_id") || "p_" + Math.random().toString(36).substring(7);
        localStorage.setItem("edu_id", myId);

        let gameState = null;

        function join() {
            const name = document.getElementById("playerName").value;
            socket.emit("edu_join", { name, playerId: myId });
            document.getElementById("setup").classList.add("hidden");
            document.getElementById("game").classList.remove("hidden");
        }

        socket.on("edu_state", (data) => {
            gameState = data;
            document.getElementById("score").innerText = data.player.score;
            document.getElementById("progress").innerText = data.player.progress;
            renderMaze();
        });

        function renderMaze() {
            const doorsDiv = document.getElementById("doors");
            const qTitle = document.getElementById("qText");
            doorsDiv.innerHTML = "";

            if (!gameState.gameStarted) {
                qTitle.innerText = "Game has not started yet.";
                return;
            }

            const currentQ = gameState.config.maze[gameState.player.progress];
            if (!currentQ) {
                qTitle.innerText = "You finished the maze! Wait for Admin.";
                return;
            }

            qTitle.innerText = currentQ.question;
            currentQ.answers.forEach((ans, index) => {
                const d = document.createElement("div");
                d.className = "door";
                d.innerText = ans.text;
                d.onclick = () => {
                    socket.emit("maze_answer", { playerId: myId, answerIndex: index });
                };
                doorsDiv.appendChild(d);
            });
        }

        socket.on("maze_result", (data) => {
            // Instant feedback
            alert(data.correct ? "Correct! You moved forward." : "Wrong door! But keep going.");
            // State will be updated by the next 'edu_state' or we can manually increment locally
            document.getElementById("score").innerText = data.score;
            gameState.player.progress = data.nextIndex;
            renderMaze();
        });

        socket.on("disconnect", () => {
            document.getElementById("status").innerText = "Disconnected! Reconnecting...";
        });

        socket.on("connect", () => {
            document.getElementById("status").innerText = "Connected";
            // Auto-rejoin if we have a name in memory
            const name = document.getElementById("playerName").value;
            if(name) socket.emit("edu_join", { name, playerId: myId });
        });
    </script>
</body>
</html>
